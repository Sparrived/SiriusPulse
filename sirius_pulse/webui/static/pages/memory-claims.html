<style>
  .claims-page { position: relative; padding-bottom: 84px; }
  .claims-toolbar {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) 150px 150px 150px auto;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .claims-input,
  .claims-select {
    background: var(--bg-3);
    border: 1px solid rgba(0,255,200,0.12);
    color: var(--text-1);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
  }
  .claims-input:focus,
  .claims-select:focus { border-color: rgba(0,255,200,0.4); }
  .claims-btn {
    background: rgba(0,255,200,0.08);
    border: 1px solid rgba(0,255,200,0.2);
    color: #00ffc8;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .claims-btn:hover { background: rgba(0,255,200,0.15); }
  .claims-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .claims-stat {
    background: var(--bg-2);
    border: 1px solid rgba(0,255,200,0.08);
    border-radius: 8px;
    padding: 14px;
  }
  .claims-stat-label {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .claims-stat-value {
    font-family: var(--font-mono);
    font-size: 22px;
    color: #00ffc8;
  }
  .claims-list {
    display: grid;
    gap: 10px;
  }
  .claim-row {
    background: var(--bg-2);
    border: 1px solid rgba(0,255,200,0.06);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .claim-row:hover {
    border-color: rgba(0,255,200,0.22);
    box-shadow: 0 0 16px rgba(0,255,200,0.05);
  }
  .claim-main {
    display: grid;
    grid-template-columns: minmax(160px, 0.9fr) minmax(240px, 1.4fr) auto;
    gap: 14px;
    align-items: start;
  }
  .claim-subject {
    color: var(--text-1);
    font-weight: 600;
    overflow-wrap: anywhere;
  }
  .claim-user-id {
    margin-top: 3px;
    color: var(--text-3);
    font-family: var(--font-mono);
    font-size: 11px;
    overflow-wrap: anywhere;
  }
  .claim-value {
    color: var(--text-1);
    font-size: 14px;
    line-height: 1.45;
    overflow-wrap: anywhere;
  }
  .claim-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .claim-pill {
    display: inline-flex;
    align-items: center;
    min-height: 20px;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    color: var(--text-2);
    background: rgba(139,148,158,0.1);
    border: 1px solid rgba(139,148,158,0.14);
  }
  .claim-pill.active { color: #00ffc8; background: rgba(0,255,200,0.08); border-color: rgba(0,255,200,0.16); }
  .claim-pill.candidate { color: #ffd23e; background: rgba(255,210,62,0.08); border-color: rgba(255,210,62,0.16); }
  .claim-pill.rejected,
  .claim-pill.shadow { color: #f85149; background: rgba(248,81,73,0.08); border-color: rgba(248,81,73,0.16); }
  .claim-actions {
    display: flex;
    justify-content: flex-end;
  }
  .claim-evidence {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(0,255,200,0.08);
  }
  .claim-evidence.open { display: block; }
  .claim-evidence-run {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--text-3);
    font-size: 12px;
  }
  .claim-evidence-item {
    border-left: 2px solid rgba(0,255,200,0.28);
    padding: 8px 10px;
    margin-top: 8px;
    background: rgba(0,255,200,0.03);
    border-radius: 0 8px 8px 0;
  }
  .claim-evidence-speaker {
    color: #00ffc8;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .claim-evidence-quote {
    color: var(--text-2);
    line-height: 1.5;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .claims-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
    font-size: 14px;
  }
  @media (max-width: 1100px) {
    .claims-toolbar { grid-template-columns: 1fr 1fr; }
    .claims-stats { grid-template-columns: repeat(2, 1fr); }
    .claim-main { grid-template-columns: 1fr; }
    .claim-actions { justify-content: flex-start; }
  }
</style>

<div class="claims-page">
  <div class="claims-toolbar">
    <input id="claimsSearch" class="claims-input" type="text" placeholder="搜索 claim、用户或谓词">
    <select id="claimsStatus" class="claims-select">
      <option value="">全部状态</option>
      <option value="active">active</option>
      <option value="candidate">candidate</option>
      <option value="superseded">superseded</option>
      <option value="rejected">rejected</option>
      <option value="shadow">shadow</option>
    </select>
    <select id="claimsType" class="claims-select">
      <option value="">全部类型</option>
      <option value="identity">identity</option>
      <option value="alias">alias</option>
      <option value="relationship">relationship</option>
      <option value="preference">preference</option>
      <option value="habit">habit</option>
      <option value="long_state">long_state</option>
      <option value="event">event</option>
      <option value="other">other</option>
    </select>
    <select id="claimsAttribution" class="claims-select">
      <option value="">全部归属</option>
      <option value="self_stated">self_stated</option>
      <option value="third_party_claim">third_party_claim</option>
      <option value="inferred">inferred</option>
      <option value="manual">manual</option>
      <option value="migration">migration</option>
    </select>
    <button id="claimsRefreshBtn" class="claims-btn">刷新</button>
  </div>
  <div id="claimsStats" class="claims-stats"></div>
  <div id="claimsList" class="claims-list">
    <div class="claims-empty">加载中...</div>
  </div>
</div>
