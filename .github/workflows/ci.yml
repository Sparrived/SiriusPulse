name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[test]
      
      - name: Run tests with pytest
        run: |
          pytest -q --tb=short --cov=sirius_pulse --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Linting & Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Lint with pylint
        continue-on-error: true
        run: |
          pylint sirius_pulse --fail-under=8.0 --disable=C0111,W0212
      
      - name: Format check with black
        run: |
          black --check --fast sirius_pulse tests
      
      - name: Import sorting check with isort
        run: |
          isort --check-only sirius_pulse tests
      
      - name: Type check with mypy
        continue-on-error: true
        run: |
          mypy sirius_pulse --ignore-missing-imports

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install bandit
      
      - name: Security scan with bandit
        continue-on-error: true
        run: |
          bandit -r sirius_pulse -ll

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [ test, lint ]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine
      
      - name: Build distribution
        run: |
          python -m build
      
      - name: Verify distribution
        run: |
          python -m twine check dist/*

      - name: Verify wheel runtime assets
        run: |
          python -c "import pathlib, zipfile; wheel=next(pathlib.Path('dist').glob('*.whl')); names=zipfile.ZipFile(wheel).namelist(); assert any(n.endswith('entry_points.txt') for n in names), 'missing console entry points'; assert any(n.endswith('sirius_pulse/webui/static/index.html') for n in names), 'missing WebUI static files'"
      
      - name: Store built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
