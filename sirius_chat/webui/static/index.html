<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiriusChat 仪表盘</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">🌟</div>
    <div>SiriusChat</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">
      <div class="nav-group-title">仪表盘</div>
      <button class="nav-item active" data-page="dashboard" onclick="navTo('dashboard')">
        <span class="icon">📊</span> 概览
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">全局</div>
      <button class="nav-item" data-page="global-settings" onclick="navTo('global-settings')">
        <span class="icon">🌍</span> 全局设置
      </button>
      <button class="nav-item" data-page="providers" onclick="navTo('providers')">
        <span class="icon">🔌</span> Provider
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">人格配置</div>
      <button class="nav-item" data-page="create-persona" onclick="navTo('create-persona')">
        <span class="icon">➕</span> 新建人格
      </button>
      <button class="nav-item" data-page="persona" onclick="navTo('persona')">
        <span class="icon">🎭</span> 人格
      </button>
      <button class="nav-item" data-page="orchestration" onclick="navTo('orchestration')">
        <span class="icon">⚙️</span> 模型编排
      </button>
      <button class="nav-item" data-page="experience" onclick="navTo('experience')">
        <span class="icon">🎚️</span> 体验参数
      </button>
      <button class="nav-item" data-page="adapters" onclick="navTo('adapters')">
        <span class="icon">🔌</span> Adapter
      </button>
      <button class="nav-item" data-page="skills" onclick="navTo('skills')">
        <span class="icon">🛠️</span> Skills
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">分析</div>
      <button class="nav-item" data-page="token-tracker" onclick="navTo('token-tracker')">
        <span class="icon">📈</span> Token 追踪
      </button>
      <button class="nav-item" data-page="cognition" onclick="navTo('cognition')">
        <span class="icon">💭</span> 认知分析
      </button>
      <button class="nav-item" data-page="diary" onclick="navTo('diary')">
        <span class="icon">📔</span> 日记
      </button>
      <button class="nav-item" data-page="users" onclick="navTo('users')">
        <span class="icon">👤</span> 用户画像
      </button>
      <button class="nav-item" data-page="glossary" onclick="navTo('glossary')">
        <span class="icon">📖</span> 名词解释
      </button>
      <button class="nav-item" data-page="stickers" onclick="navTo('stickers')">
        <span class="icon">🎭</span> 表情包
      </button>
      <button class="nav-item" data-page="memory-viz" onclick="navTo('memory-viz')">
        <span class="icon">🧩</span> 记忆可视化
      </button>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">平台</div>
      <button class="nav-item" data-page="napcat" onclick="navTo('napcat')">
        <span class="icon">🐧</span> NapCat
      </button>
    </div>
  </nav>
  <div class="sidebar-status">
    <div class="status-row">
      <span>当前人格</span>
      <span id="sbCurrentPersona">—</span>
    </div>
    <div class="status-row">
      <span>人格总数</span>
      <span id="sbPersonaCount">0</span>
    </div>
    <div class="status-row">
      <span><span class="status-dot" id="sbRunningDot"></span> 运行中</span>
      <span id="sbRunningCount">0</span>
    </div>
  </div>
</aside>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="header-title" id="pageTitle">概览</div>
    <div class="header-breadcrumb" id="pageBreadcrumb">Dashboard</div>
  </div>
  <div class="header-right" id="headerActions">
    <div class="diary-dropdown" id="themeDropdown" style="position:relative;width:auto">
      <button class="diary-dropdown-btn" onclick="themeToggleDropdown()" style="width:auto;min-width:100px;background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px">
        <span id="themeDropdownLabel">🌙 暗色</span>
        <span style="font-size:10px;transition:transform .2s" id="themeDropdownArrow">▼</span>
      </button>
      <div class="diary-dropdown-list" id="themeDropdownList" style="display:none;position:absolute;top:calc(100% + 4px);right:0;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:10;max-height:240px;overflow-y:auto;padding:4px">
        <!-- populated by JS -->
      </div>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main" id="mainContainer"></main>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<script src="/static/core.js"></script>
<script src="/static/config.js"></script>
<script src="/static/analytics.js"></script>
<script src="/static/platform.js"></script>
</body>
</html>
