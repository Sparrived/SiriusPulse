<div class="page active" id="page-biography">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar" id="bioPersonaSelect">加载中...</div>
  </div>

  <!-- Stats -->
  <div class="card">
    <h2>人物传记概览</h2>
    <div class="stat-grid" id="bioStats">
      <div class="stat-card"><div class="label">传记卡总数</div><div class="value" id="bioTotal">—</div></div>
      <div class="stat-card"><div class="label">蒸馏要点</div><div class="value" id="bioDistilled">—</div></div>
      <div class="stat-card"><div class="label">别名条目</div><div class="value" id="bioAliasCount">—</div></div>
      <div class="stat-card"><div class="label">最近更新</div><div class="value" id="bioLastUpdate" style="font-size:12px">—</div></div>
    </div>
  </div>

  <!-- User cards list -->
  <div class="card">
    <h2>
      传记卡片
      <button class="btn btn-sm btn-outline" onclick="bioRefresh()" style="margin-left:12px">🔄 刷新</button>
    </h2>
    <div id="bioCardList" style="display:flex;flex-direction:column;gap:12px">
      <div style="color:var(--text-2);padding:12px">加载中...</div>
    </div>
  </div>

  <!-- Alias index management -->
  <div class="card">
    <h2>别名索引管理</h2>
    <div id="bioAliasSection" style="color:var(--text-2)">加载中...</div>
  </div>

  <!-- Detail modal -->
  <div id="bioModal" style="display:none;position:fixed;z-index:100;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center">
    <div style="background:var(--surface);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.5)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="margin:0" id="bioModalTitle">传记详情</h3>
        <button onclick="bioCloseModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-2)">✕</button>
      </div>
      <div id="bioModalBody"></div>
    </div>
  </div>
</div>
