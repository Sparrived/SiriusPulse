<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">实时日志</div>
      <div class="card-subtitle">WebUI 和人格分开查看</div>
    </div>
    <div class="logs-toolbar">
      <button class="btn btn-sm" id="logsRefresh">刷新</button>
      <button class="btn btn-sm" id="logsPause">暂停</button>
      <button class="btn btn-sm" id="logsClear">清屏</button>
    </div>
  </div>
  <div class="tabs logs-tabs" id="logsTabs">
    <button class="tab-btn active" data-source="webui">WebUI</button>
    <button class="tab-btn" data-source="persona">人格</button>
  </div>
  <div class="logs-status-row">
    <span id="logsStatus" class="logs-status">准备连接</span>
    <span id="logsPath" class="logs-path"></span>
  </div>
  <pre id="logsConsole" class="logs-console"></pre>
</div>
