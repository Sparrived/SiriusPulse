<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sirius Pulse — 登录</title>
  <link rel="icon" href="/static/yuebai.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display@400&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas#starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-header .icon {
      font-size: 42px;
      margin-bottom: 16px;
      display: inline-block;
      animation: twinkle 2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.1);
      }
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .login-header p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .error-message {
      color: #f87171;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
      padding: 10px;
      background: rgba(248, 113, 113, 0.1);
      border-radius: 8px;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }

    .shooting-star {
      position: fixed;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
      border-radius: 1px;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="login-container">
    <div class="login-header">
      <div class="icon">✦</div>
      <h1>Sirius Pulse</h1>
      <p>请输入管理员密码以访问天文台</p>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="loginPassword" type="password" placeholder="输入密码" autofocus>
    </div>
    <div id="loginError" class="error-message"></div>
    <button id="loginBtn" class="login-btn">登录</button>
    <div class="footer-text">Sirius Pulse v1.1.0</div>
  </div>

  <script>
    if (localStorage.getItem('sirius_token')) {
      window.location.href = '/';
    }

    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let shootingStars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.5 + 0.5,
          opacity: Math.random() * 0.8 + 0.2,
          twinkleSpeed: Math.random() * 0.02 + 0.01,
          twinklePhase: Math.random() * Math.PI * 2
        });
      }
    }

    function createShootingStar() {
      if (Math.random() > 0.02) return;
      shootingStars.push({
        x: Math.random() * canvas.width * 0.8 + canvas.width * 0.2,
        y: Math.random() * canvas.height * 0.3,
        length: Math.random() * 80 + 40,
        speed: Math.random() * 8 + 4,
        opacity: 1,
        angle: Math.PI / 4
      });
    }

    function drawStars(time) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, canvas.width * 0.7
      );
      gradient.addColorStop(0, '#0f0f2e');
      gradient.addColorStop(1, '#0a0a1a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => {
        const twinkle = Math.sin(time * star.twinkleSpeed + star.twinklePhase);
        const currentOpacity = star.opacity * (0.7 + twinkle * 0.3);

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity})`;
        ctx.fill();

        if (star.radius > 1) {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius * 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 200, 255, ${currentOpacity * 0.3})`;
          ctx.fill();
        }
      });

      shootingStars = shootingStars.filter(star => star.opacity > 0);
      shootingStars.forEach(star => {
        ctx.save();
        ctx.translate(star.x, star.y);
        ctx.rotate(star.angle);

        const gradient = ctx.createLinearGradient(0, 0, -star.length, 0);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-star.length, 0);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();

        star.x += Math.cos(star.angle) * star.speed;
        star.y += Math.sin(star.angle) * star.speed;
        star.opacity -= 0.015;
      });
    }

    function animate(time) {
      createShootingStar();
      drawStars(time);
      requestAnimationFrame(animate);
    }

    resizeCanvas();
    createStars(300);
    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      resizeCanvas();
      createStars(300);
    });

    async function doLogin() {
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');

      if (!password) {
        errEl.textContent = '请输入密码';
        errEl.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      errEl.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password })
        });

        const data = await response.json();

        if (data.success && data.token) {
          localStorage.setItem('sirius_token', data.token);
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || '登录失败';
          errEl.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      } catch (e) {
        errEl.textContent = '网络错误，请稍后重试';
        errEl.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    }

    document.getElementById('loginBtn').onclick = doLogin;
    document.getElementById('loginPassword').onkeydown = (e) => {
      if (e.key === 'Enter') doLogin();
    };
  </script>
</body>
</html>
