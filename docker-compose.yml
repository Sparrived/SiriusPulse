services:
  sirius-pulse:
    build:
      context: .
      args:
        SIRIUS_PLAYWRIGHT_CACHE_IMAGE: ${SIRIUS_PLAYWRIGHT_CACHE_IMAGE:-playwright-cache-empty}
    image: sirius-pulse:latest
    container_name: sirius-pulse-v2-test
    restart: unless-stopped
    network_mode: host
    environment:
      SIRIUS_PULSE_HOME: /app
      SIRIUS_PULSE_FILE_ROOT: /
    volumes:
      - ./data:/app/data
      - /root/.cache/huggingface:/home/sirius/.cache/huggingface
      - ${SIRIUS_CONTAINER_ADMIN_SOCKET:-/dev/null}:/run/sirius-container-admin.sock:ro
    command: ["run"]
    healthcheck:
      test:
        ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8080), 3).close()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
