<div class="page active" id="page-create-persona">
  <div class="persona-bar">
    <label>目标人格</label>
    <div class="persona-select-bar"></div>
  </div>

  <div class="card">
    <h2>快速创建</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>人格标识（目录名）</label>
          <input type="text" id="cpName" placeholder="例如：akane">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>角色名称</label>
          <input type="text" id="cpPersonaName" placeholder="例如：茜">
        </div>
      </div>
    </div>
    <button class="btn success" onclick="createBlankPersona()">➕ 创建空白人格</button>
  </div>

  <div class="card">
    <h2>问卷深度定制</h2>
    <div id="interviewQuestions"></div>
    <div class="form-group">
      <label>角色名称</label>
      <input type="text" id="ivName" value="小星">
    </div>
    <div class="form-group">
      <label>别名（空格分隔）</label>
      <input type="text" id="ivAliases" placeholder="例如：星酱 星星">
    </div>
    <div class="form-group">
      <label>生成模型</label>
      <select id="ivModel"></select>
    </div>
    <button class="btn" id="ivBtn" onclick="generatePersonaInterview()">✨ 生成人格</button>
    <div id="ivResult" style="margin-top:16px"></div>
  </div>
</div>
