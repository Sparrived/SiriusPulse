<div class="stat-grid" id="ttSummaryStats"></div>
<div class="card" style="margin-top:20px">
  <div class="tabs" id="ttTabBar">
    <button class="tab-btn active" data-tab="overview" onclick="ttSwitchTab('overview')">概览</button>
    <button class="tab-btn" data-tab="module" onclick="ttSwitchTab('module')">模块</button>
    <button class="tab-btn" data-tab="dimension" onclick="ttSwitchTab('dimension')">维度</button>
    <button class="tab-btn" data-tab="detail" onclick="ttSwitchTab('detail')">明细</button>
  </div>
  <div class="tab-panel active" data-tab="overview">
    <div id="ttTimeSeries" class="chart-container"></div>
    <div id="ttActiveHours" class="chart-container" style="margin-top:16px"></div>
  </div>
  <div class="tab-panel" data-tab="module">
    <div id="ttSectionBreakdown" class="chart-container"></div>
    <div id="ttTaskHierarchy" class="chart-container" style="margin-top:16px"></div>
  </div>
  <div class="tab-panel" data-tab="dimension">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><div class="card-title">按模型</div><div id="ttByModel" class="chart-container"></div></div>
      <div class="card"><div class="card-title">按群组</div><div id="ttByGroup" class="chart-container"></div></div>
      <div class="card"><div class="card-title">按 Provider</div><div id="ttByProvider" class="chart-container"></div></div>
      <div class="card"><div class="card-title">按任务</div><div id="ttByTask" class="chart-container"></div></div>
    </div>
  </div>
  <div class="tab-panel" data-tab="detail">
    <table id="ttRecentTable"><thead><tr><th>时间</th><th>任务</th><th>模型</th><th>Prompt</th><th>Completion</th><th>Breakdown</th></tr></thead><tbody></tbody></table>
  </div>
</div>
