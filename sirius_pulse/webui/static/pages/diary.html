<div class="page active" id="page-diary">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar" id="diaryPersonaSelect">加载中...</div>
  </div>

  <!-- Stats -->
  <div class="card">
    <h2>日记统计</h2>
    <div class="stat-grid" id="diaryStats">
      <div class="stat-card"><div class="label">总条数</div><div class="value" id="diaryTotal">—</div></div>
      <div class="stat-card"><div class="label">覆盖群数</div><div class="value" id="diaryGroups">—</div></div>
    </div>
    <div style="margin-top:12px">
      <h3 style="font-size:13px;color:var(--text-2);margin-bottom:8px">热门关键词</h3>
      <div id="diaryKeywords" style="display:flex;flex-wrap:wrap;gap:6px">暂无数据</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="card">
    <h2 style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:nowrap">
      <span style="white-space:nowrap">日记列表</span>
      <div class="diary-dropdown" id="diaryGroupDropdown" style="position:relative;flex-shrink:0;width:160px">
        <button class="diary-dropdown-btn" onclick="diaryToggleDropdown()" style="width:100%;background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
          <span id="diaryDropdownLabel">全部群聊</span>
          <span style="font-size:10px;transition:transform .2s" id="diaryDropdownArrow">▼</span>
        </button>
        <div class="diary-dropdown-list" id="diaryDropdownList" style="display:none;position:absolute;top:calc(100% + 4px);right:0;min-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:10;max-height:240px;overflow-y:auto">
          <div onclick="diarySelectGroup('')" class="diary-dropdown-item" style="padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text);border-radius:6px;margin:4px">全部群聊</div>
        </div>
      </div>
    </h2>
    <div id="diaryKeywordFilterBar" style="display:none;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text-2)">关键词筛选:</span>
      <span id="diaryActiveKeyword" style="background:var(--accent);color:#fff;border-radius:12px;padding:3px 10px;font-size:12px"></span>
      <button class="btn small" onclick="diaryClearKeyword()" style="font-size:11px">清除</button>
    </div>
    <div id="diaryList" style="display:flex;flex-direction:column;gap:12px">
      <div style="color:var(--text-2);padding:12px">加载中...</div>
    </div>
  </div>
</div>
