<div class="page active" id="page-plugins">

  <!-- Plugin 列表 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>🔌 Plugin 管理</h2>
      <button class="btn small" onclick="reloadPlugins()" style="padding:5px 12px;font-size:12px">🔄 刷新</button>
    </div>
    <p style="color:var(--text-2);font-size:13px;margin-bottom:16px">
      管理全局 Plugin 的启用/禁用状态与源码编辑。插件位于项目根 <code>plugins/</code> 目录。
    </p>
    <div id="pluginsList">加载中...</div>
  </div>

  <!-- Plugin 详情/编辑模态框 -->
  <div id="pluginDetailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:90%;max-width:800px;max-height:85vh;overflow:auto;display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0">
        <h3 id="pluginDetailTitle">Plugin 详情</h3>
        <button class="btn small" onclick="closePluginDetail()">✕</button>
      </div>

      <!-- 元数据 -->
      <div id="pluginDetailMeta" style="flex-shrink:0;margin-bottom:16px"></div>

      <!-- Tab 切换：信息 / 源码 -->
      <div style="display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid var(--border);flex-shrink:0">
        <button id="pluginTabInfo" class="btn small" style="border-radius:6px 6px 0 0;background:var(--accent);color:#fff;border:none"
                onclick="switchPluginTab('info')">📋 信息</button>
        <button id="pluginTabSource" class="btn small" style="border-radius:6px 6px 0 0;background:transparent;color:var(--text-2);border:none"
                onclick="switchPluginTab('source')">📝 源码</button>
      </div>

      <!-- 信息面板 -->
      <div id="pluginPanelInfo" style="flex:1;overflow:auto">
        <div id="pluginDetailCommands"></div>
        <div id="pluginDetailParams"></div>
        <div id="pluginDetailNL"></div>
      </div>

      <!-- 源码编辑面板 -->
      <div id="pluginPanelSource" style="display:none;flex:1;overflow:hidden;flex-direction:column">
        <textarea id="pluginSourceEditor" style="flex:1;min-height:300px;background:var(--bg-1);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;resize:vertical;tab-size:4;white-space:pre;overflow:auto"></textarea>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="btn" onclick="closePluginDetail()">取消</button>
          <button class="btn success" onclick="savePluginSource()">💾 保存源码</button>
        </div>
      </div>
    </div>
  </div>
</div>
