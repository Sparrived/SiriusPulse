# 文档自动同步 Workflow
# 主仓库 push 后，AI 自动判断是否需要更新 docs 仓库，需要则自动提交 PR
#
# 必须设置的 Secrets:
#   DOCS_REPO_PAT    — GitHub PAT（repo 权限），用于推送 docs 仓库
#   DOCS_BOT_API_KEY — LLM API Key（可用任何兼容 OpenAI 接口的 provider key）
# 可选 Secrets:
#   LLM_BASE_URL     — LLM API 地址（默认 https://api.openai.com/v1）
#   LLM_MODEL        — 模型名（默认 gpt-4o-mini）
#   GIT_USER_NAME    — 提交者名称（默认 "Sirius Docs Bot"）
#   GIT_USER_EMAIL   — 提交者邮箱（默认 "bot@sirius.pulse"）
#   DOCS_FORK        — Fork 仓库名（如 "YourName/SiriusPulse-Docs"），
#                      设置后从 fork 克隆并提跨仓库 PR。
#                      需要用 Classic PAT（repo scope）作 DOCS_REPO_PAT

name: 文档自动同步

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'scripts/ci_check.py'
      - 'scripts/setup_dev_env.py'
      - 'Makefile'

concurrency:
  group: docs-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-docs-sync:
    name: AI 自动判断并更新文档
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # 需要完整 git 历史用于计算 diff
          fetch-depth: 0

      # 自动生成 docs 目录树索引
      - name: 生成 docs 目录索引
        id: docs-index
        shell: bash
        run: |
          if [ -d "docs" ]; then
            # 生成树状结构，只包含 .md 文件，排除 node_modules 等
            TREE=$(find docs -name "*.md" -type f | sort | sed 's|^|  |')
            echo "docs_tree<<EOF" >> $GITHUB_OUTPUT
            echo "$TREE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "✅ docs 目录索引已生成"
          else
            echo "⚠️ docs 目录不存在"
            echo "docs_tree=" >> $GITHUB_OUTPUT
          fi

      # 恢复上次同步的状态（跨运行持久化）
      - name: 恢复同步状态缓存
        uses: actions/cache@v4
        id: sync-state-cache
        with:
          path: .docs-sync-state
          key: docs-sync-state-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            docs-sync-state-${{ github.ref_name }}-

      - name: 运行 AI 文档同步 Agent
        env:
          DOCS_REPO_PAT: ${{ secrets.DOCS_REPO_PAT }}
          LLM_API_KEY: ${{ secrets.DOCS_BOT_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
          DOCS_FORK: ${{ secrets.DOCS_FORK }}
          # Push Event 提供的准确 commit 范围（首次运行/cache 丢失时兜底）
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          # 自动生成的 docs 目录树（用于 LLM 上下文）
          DOCS_TREE: ${{ steps.docs-index.outputs.docs_tree }}
        run: |
          python scripts/docs_sync_agent.py
