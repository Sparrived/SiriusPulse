<div class="page active" id="page-stickers">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar"></div>
  </div>

  <!-- 统计卡片 -->
  <div class="card">
    <h2>📊 表情包库概览</h2>
    <div id="stickerStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:12px">
      <div class="stat-card">
        <div class="stat-value" id="ssTotal">0</div>
        <div class="stat-label">表情包总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="ssGroups">0</div>
        <div class="stat-label">来源群聊</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="ssUsage">0</div>
        <div class="stat-label">总使用次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="ssVector">—</div>
        <div class="stat-label">向量存储</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="ssGeneralized">0</div>
        <div class="stat-label">场景概括</div>
      </div>
    </div>
  </div>

  <!-- 偏好信息 -->
  <div class="card" id="stickerPreferenceCard" style="display:none">
    <h2>🎭 人格偏好</h2>
    <div id="stickerPreferenceBody" style="margin-top:12px"></div>
  </div>

  <!-- 标签云 -->
  <div class="card">
    <h2>🏷️ 热门标签</h2>
    <div id="stickerTags" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>

  <!-- 表情包列表 -->
  <div class="card">
    <h2>🖼️ 表情包列表</h2>
    <p style="color:var(--text-2);font-size:13px;margin-bottom:12px">
      显示最近收集的表情包。点击可查看详情，悬停可预览使用情境。
    </p>
    <div id="stickerList"></div>
  </div>

  <!-- 详情模态框 -->
  <div id="stickerDetailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:90%;max-width:520px;max-height:80vh;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 id="stickerDetailTitle">表情包详情</h3>
        <button class="btn small" onclick="closeStickerDetail()">✕</button>
      </div>
      <div id="stickerDetailBody"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn danger" onclick="deleteCurrentSticker()">🗑️ 删除</button>
        <button class="btn" onclick="closeStickerDetail()">关闭</button>
      </div>
    </div>
  </div>
</div>
