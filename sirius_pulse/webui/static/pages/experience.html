<div class="page active" id="page-experience">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar"></div>
  </div>

  <!-- 行为风格 -->
  <div class="card">
    <h2>行为风格</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>回复模式</label>
          <select id="expReplyMode">
            <option value="auto">自动</option>
            <option value="always">总是回复</option>
            <option value="never">从不回复</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>参与敏感度 (0~1)</label>
          <input type="number" id="expSensitivity" min="0" max="1" step="0.1" value="0.5" oninput="updateExpressivenessLabel()">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>活泼度 (0~1)</label>
          <input type="number" id="expExpressiveness" min="0" max="1" step="0.1" value="0.5" oninput="updateExpressivenessLabel()">
        </div>
      </div>
    </div>

    <!-- 四象限图 -->
    <div style="margin-top:8px;display:flex;justify-content:center">
      <div style="position:relative;width:100%;max-width:360px;height:260px;border:1px solid var(--border);border-radius:10px;background:var(--bg-2);overflow:hidden;cursor:pointer" onclick="onQuadrantClick(event)">
        <!-- 轴标题 -->
        <div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-3);letter-spacing:1px">活泼度 ↑</div>
        <div style="position:absolute;bottom:6px;right:8px;font-size:10px;color:var(--text-3);letter-spacing:1px">参与敏感度 →</div>
        <!-- 象限标签 -->
        <div style="position:absolute;top:24%;left:26%;transform:translate(-50%,-50%);font-size:12px;color:var(--text-2);font-weight:600;opacity:0.6;white-space:nowrap">选择性参与</div>
        <div style="position:absolute;top:24%;left:74%;transform:translate(-50%,-50%);font-size:12px;color:var(--text-2);font-weight:600;opacity:0.6;white-space:nowrap">积极主导</div>
        <div style="position:absolute;top:74%;left:26%;transform:translate(-50%,-50%);font-size:12px;color:var(--text-2);font-weight:600;opacity:0.6;white-space:nowrap">深度观察</div>
        <div style="position:absolute;top:74%;left:74%;transform:translate(-50%,-50%);font-size:12px;color:var(--text-2);font-weight:600;opacity:0.6;white-space:nowrap">被动回应</div>
        <!-- 轴线 -->
        <div style="position:absolute;top:50%;left:12px;right:12px;height:1px;background:var(--border);opacity:0.35"></div>
        <div style="position:absolute;left:50%;top:12px;bottom:12px;width:1px;background:var(--border);opacity:0.35"></div>
        <!-- 轴端标签 -->
        <div style="position:absolute;bottom:4px;left:12px;font-size:10px;color:var(--text-3)">克制</div>
        <div style="position:absolute;bottom:4px;right:12px;font-size:10px;color:var(--text-3)">活跃</div>
        <div style="position:absolute;top:12px;left:6px;font-size:10px;color:var(--text-3)">开放</div>
        <div style="position:absolute;bottom:22px;left:6px;font-size:10px;color:var(--text-3)">保守</div>
        <!-- 当前位置点 -->
        <div id="expQuadrantDot" style="position:absolute;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.35);transform:translate(-50%,-50%);transition:left 0.18s ease,top 0.18s ease;left:50%;top:50%"></div>
      </div>
    </div>

    <!-- 文字描述 -->
    <div id="expStylePreview" style="margin-top:12px;font-size:13px;color:var(--text-2);padding:10px 14px;background:var(--bg-2);border-radius:6px;border:1px solid var(--border);text-align:center">均衡互动型：决策活跃度与行为边界均处于中等水平，根据对话上下文自然参与。</div>
  </div>

  <!-- 主动行为 -->
  <div class="card">
    <h2>主动行为</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>主动行为</label>
          <select id="expProactive">
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>主动间隔 (秒)</label>
          <input type="number" id="expProactiveInterval" value="300">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>活跃时段 (时)</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="number" id="expActiveStart" min="0" max="23" value="8" style="flex:1">
            <span>~</span>
            <input type="number" id="expActiveEnd" min="0" max="23" value="23" style="flex:1">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 回复控制 -->
  <div class="card">
    <h2>回复控制</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>延迟回复</label>
          <select id="expDelayReply">
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>热度窗口 (秒)</label>
          <input type="number" id="expHeatWindow" value="60">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>待处理消息阈值</label>
          <input type="number" id="expPendingThreshold" value="4">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>最小回复间隔 (秒)</label>
          <input type="number" id="expMinReplyInterval" value="0">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>回复频率窗口 (秒)</label>
          <input type="number" id="expReplyFreqWindow" value="60">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>频率窗口最大回复数</label>
          <input type="number" id="expReplyFreqMax" value="8">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>提及豁免频率限制</label>
          <select id="expExemptMention">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- 技能与资源 -->
  <div class="card">
    <h2>技能与资源</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>启用 Skills</label>
          <select id="expEnableSkills">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>最大 Skill 轮次</label>
          <input type="number" id="expMaxSkillRounds" value="3">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>Skill 超时 (秒)</label>
          <input type="number" id="expSkillTimeout" value="30">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>自动安装 Skill 依赖</label>
          <select id="expAutoInstallDeps">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>最大并发 LLM 调用</label>
          <input type="number" id="expMaxConcurrent" value="1">
        </div>
      </div>
    </div>
  </div>

  <!-- 基础记忆 -->
  <div class="card">
    <h2>基础记忆</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>硬限制（条）</label>
          <input type="number" id="expBasicMemoryHardLimit" min="10" max="200" value="30">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>上下文窗口（条）</label>
          <input type="number" id="expBasicMemoryContextWindow" min="1" max="50" value="5">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>日记检索条数</label>
          <input type="number" id="expDiaryTopK" min="1" max="20" value="5">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>日记 Token 预算</label>
          <input type="number" id="expDiaryTokenBudget" min="200" max="2000" value="800">
        </div>
      </div>
      <div class="col" style="flex:2">
        <div class="form-group">
          <label>表情包跳过概率 (0=总发送, 1=全跳过, 默认 33%)</label>
          <input type="range" id="expStickerSkipProb" min="0" max="1" step="0.01" value="0.33" oninput="updateStickerSkipLabel()">
          <span id="expStickerSkipProbLabel" style="font-size:12px;color:var(--text-2)">33% 跳过</span>
        </div>
      </div>
      <div class="col" style="flex:2">
        <div class="form-group">
          <label>群里其他 AI/Bot 名字</label>
          <input type="text" id="expOtherAINames" placeholder="yuki, 小冰, 逗逗（逗号分隔）">
        </div>
      </div>
    </div>
  </div>

  <!-- 向量存储 -->
  <div class="card">
    <h2>向量存储</h2>
    <div id="vectorStoreStatus" style="font-size:13px;color:var(--text-2)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span id="vsStatusDot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#999"></span>
        <span id="vsStatusText">加载中...</span>
      </div>
      <div class="row" id="vsStatsRow" style="display:none">
        <div class="col">
          <div class="form-group">
            <label>总条目数</label>
            <div id="vsTotalEntries" style="font-size:18px;font-weight:700;color:var(--text)">—</div>
          </div>
        </div>
        <div class="col">
          <div class="form-group">
            <label>模型</label>
            <div id="vsModelName" style="font-size:14px;color:var(--text)">—</div>
          </div>
        </div>
        <div class="col">
          <div class="form-group">
            <label>群组数</label>
            <div id="vsGroupCount" style="font-size:18px;font-weight:700;color:var(--text)">—</div>
          </div>
        </div>
      </div>
      <div id="vsGroupList" style="margin-top:8px;display:none"></div>
    </div>
  </div>

  <!-- 记忆深度 -->
  <div class="card">
    <h2>记忆深度</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>记忆深度</label>
          <select id="expMemoryDepth">
            <option value="shallow">浅</option>
            <option value="moderate">中</option>
            <option value="deep">深</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex;justify-content:flex-end;padding:0 4px 12px">
    <button class="btn success" onclick="saveExperience()" style="font-size:15px;padding:10px 24px">💾 保存体验参数</button>
  </div>
</div>
