<style>
  .sit-page { position: relative; }
  .sit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .sit-refresh {
    background: rgba(0,255,200,0.08);
    border: 1px solid rgba(0,255,200,0.2);
    color: #00ffc8;
    padding: 7px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
  }
  .sit-refresh:hover {
    background: rgba(0,255,200,0.15);
    box-shadow: 0 0 12px rgba(0,255,200,0.2);
  }
  .sit-timeline {
    position: relative;
    padding-left: 30px;
  }
  .sit-timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, rgba(0,255,200,0.3), rgba(0,229,255,0.1), transparent);
    border-radius: 1px;
  }
  .sit-node {
    position: relative;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateX(-12px);
    animation: sit-slide-in 0.4s ease forwards;
  }
  @keyframes sit-slide-in {
    to { opacity: 1; transform: translateX(0); }
  }
  .sit-node::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 18px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #00ffc8;
    box-shadow: 0 0 10px rgba(0,255,200,0.4);
    z-index: 1;
  }
  .sit-card {
    background: var(--bg-2);
    border: 1px solid rgba(0,255,200,0.06);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .sit-card:hover {
    border-color: rgba(0,255,200,0.2);
    box-shadow: 0 0 16px rgba(0,255,200,0.06);
  }
  .sit-time {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .sit-summary {
    font-size: 14px;
    color: var(--text-1);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .sit-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .sit-tag {
    display: inline-flex;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    color: #00ffc8;
    background: rgba(0,255,200,0.06);
    border: 1px solid rgba(0,255,200,0.12);
  }
  .sit-stats {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-3);
  }
  .sit-stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .sit-stat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .sit-stat-dot.ok { background: #00ffc8; }
  .sit-stat-dot.reject { background: #f85149; }
  .sit-triples {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(0,255,200,0.08);
    display: none;
  }
  .sit-triples.open { display: block; }
  .sit-triple-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .sit-triple-s { color: #00ffc8; }
  .sit-triple-p { color: #7b61ff; }
  .sit-triple-o { color: #00e5ff; }
  .sit-triple-arrow { color: var(--text-3); }
  .sit-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
    font-size: 14px;
  }
</style>

<div class="sit-page">
  <div class="sit-header">
    <div style="font-size:14px;color:var(--text-2)">
      <span id="sitCount">0</span> 条情景记录
    </div>
    <button class="sit-refresh" id="sitRefreshBtn">刷新</button>
  </div>
  <div class="sit-timeline" id="sitTimeline">
    <div class="sit-empty">加载中…</div>
  </div>
</div>
