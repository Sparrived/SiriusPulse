services:
  sirius-pulse:
    build: .
    image: sirius-pulse:latest
    container_name: sirius-pulse-v2-test
    restart: unless-stopped
    network_mode: host
    environment:
      SIRIUS_PULSE_HOME: /app
      SIRIUS_PULSE_FILE_ROOT: /
    volumes:
      - ./data:/app/data
    command: ["run"]
    depends_on:
      embedding:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8080), 3).close()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  embedding:
    image: sirius-pulse:latest
    container_name: sirius-pulse-v2-embedding
    restart: unless-stopped
    network_mode: host
    environment:
      SIRIUS_PULSE_HOME: /app
    volumes:
      - /root/.cache/huggingface:/home/sirius/.cache/huggingface
    entrypoint: ["python"]
    command: ["-m", "sirius_pulse.embedding.server"]
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18900/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
