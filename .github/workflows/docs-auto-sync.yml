# 文档自动同步 Workflow
# 主仓库 push 后，AI 自动判断是否需要更新 docs 仓库，需要则自动提交 PR
#
# 必须设置的 Secrets:
#   DOCS_REPO_PAT    — GitHub PAT（repo 权限），用于推送 docs 仓库
#   DOCS_BOT_API_KEY — LLM API Key（可用任何兼容 OpenAI 接口的 provider key）
# 可选 Secrets:
#   LLM_BASE_URL     — LLM API 地址（默认 https://api.openai.com/v1）
#   LLM_MODEL        — 模型名（默认 gpt-4o-mini）

name: 文档自动同步

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'scripts/ci_check.py'
      - 'scripts/setup_dev_env.py'
      - 'Makefile'

jobs:
  auto-docs-sync:
    name: AI 自动判断并更新文档
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # 需要完整历史，因为用 git tag 做 diff 积累状态标记
          fetch-depth: 0

      - name: 运行 AI 文档同步 Agent
        env:
          DOCS_REPO_PAT: ${{ secrets.DOCS_REPO_PAT }}
          LLM_API_KEY: ${{ secrets.DOCS_BOT_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python scripts/docs_sync_agent.py
