<div class="page active" id="page-plugins">

  <!-- Plugin 列表 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>🔌 Plugin 管理</h2>
      <button class="btn small" onclick="reloadPlugins()" style="padding:5px 12px;font-size:12px">🔄 刷新</button>
    </div>
    <p style="color:var(--text-2);font-size:13px;margin-bottom:16px">
      管理全局 Plugin 的启用/禁用状态及权限配置。插件位于项目根 <code>plugins/</code> 目录。
    </p>
    <div id="pluginsList">加载中...</div>
  </div>

  <!-- Plugin 详情/配置模态框 -->
  <div id="pluginDetailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:90%;max-width:700px;max-height:85vh;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 id="pluginDetailTitle">Plugin 详情</h3>
        <button class="btn small" onclick="closePluginDetail()">✕</button>
      </div>

      <div id="pluginDetailMeta" style="margin-bottom:16px"></div>
      <div id="pluginDetailCommands"></div>
      <div id="pluginDetailParams"></div>
      <div id="pluginDetailNL"></div>

      <!-- 权限配置 -->
      <div id="pluginDetailConfig" style="border-top:1px solid var(--border);margin-top:16px;padding-top:16px">
        <h4 style="margin:0 0 12px;font-size:14px">⚙️ 权限配置</h4>
        <div class="form-group" style="margin-bottom:12px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="pluginCfgDevOnly">
            <span>仅开发者可用</span>
          </label>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="pluginCfgHiddenIntent">
            <span>对意图识别隐藏（指令和插件不出现在意图识别的 LLM 提示中，也不被规则匹配）</span>
          </label>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label>群黑名单（一行一个群号，在此名单中的群将禁用此插件）</label>
          <textarea id="pluginCfgGroupBlacklist" rows="3" style="background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13px" placeholder="留空表示不限制"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label>限流调用频率（次/分钟）</label>
          <input type="number" id="pluginCfgRateLimit" value="60" min="1" max="1000" style="background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;width:100px">
        </div>
      </div>

      <!-- Prompt 注入 -->
      <div id="pluginDetailInject" style="border-top:1px solid var(--border);margin-top:16px;padding-top:16px;display:none">
        <h4 style="margin:0 0 8px;font-size:14px">🧠 Prompt 注入</h4>
        <p style="color:var(--text-2);font-size:12px;margin-bottom:8px">
          插件注入到人格 prompt 的提示词，让 AI 知晓插件能力但不需要主动调用。
        </p>
        <pre id="pluginDetailInjectText" style="background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin:0"></pre>
      </div>

      <!-- 自定义配置 -->
      <div id="pluginDetailSettings" style="border-top:1px solid var(--border);margin-top:16px;padding-top:16px;display:none">
        <h4 style="margin:0 0 12px;font-size:14px">🔧 自定义配置</h4>
        <div id="pluginSettingsForm"></div>
      </div>

      <!-- 保存按钮 -->
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn" onclick="closePluginDetail()">取消</button>
        <button class="btn success" onclick="savePluginConfig()">💾 保存配置</button>
      </div>
    </div>
  </div>
</div>
