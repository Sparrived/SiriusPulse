<div class="page active" id="page-adapters">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar"></div>
  </div>
  <div class="card">
    <h2>Adapter 配置 (NapCat)</h2>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>启用</label>
          <select id="adEnabled">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>QQ 号</label>
          <input type="text" id="adQQ" placeholder="123456789">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>WebSocket 地址</label>
          <input type="text" id="adWsUrl" placeholder="ws://localhost:3001">
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>Token</label>
          <input type="text" id="adToken" placeholder="napcat_ws">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>管理员 QQ</label>
          <input type="text" id="adRoot" placeholder="">
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label>群聊</label>
          <select id="adEnableGroup">
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label>私聊</label>
          <select id="adEnablePrivate">
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section-title">群白名单</div>
    <div class="form-group">
      <label>添加群号</label>
      <div class="row">
        <input type="text" id="newGroupId" placeholder="输入群号" style="flex:1">
        <button class="btn" onclick="addGroup()">添加</button>
      </div>
    </div>
    <div class="tag-list" id="groupTags"></div>

    <div class="section-title">私聊白名单</div>
    <div class="form-group">
      <label>添加 QQ 号</label>
      <div class="row">
        <input type="text" id="newPrivateId" placeholder="输入 QQ 号" style="flex:1">
        <button class="btn" onclick="addPrivate()">添加</button>
      </div>
    </div>
    <div class="tag-list" id="privateTags"></div>

    <div id="adaptersDirtyHint" style="display:none;color:var(--warn);font-size:13px;margin-bottom:12px">
      ⚠️ 白名单有未保存的更改
    </div>
    <button class="btn success" id="adaptersSaveBtn" onclick="saveAdapters()">💾 保存配置</button>
  </div>
</div>
