<div class="page active" id="page-glossary">
  <div class="persona-bar">
    <label>当前人格</label>
    <div class="persona-select-bar" id="glossaryPersonaSelect">加载中...</div>
  </div>

  <!-- Stats -->
  <div class="card">
    <h2>名词解释统计</h2>
    <div class="stat-grid" id="glossaryStats">
      <div class="stat-card"><div class="label">词条总数</div><div class="value" id="glossaryTotal">—</div></div>
      <div class="stat-card"><div class="label">覆盖群数</div><div class="value" id="glossaryGroups">—</div></div>
    </div>
  </div>

  <!-- Filter -->
  <div class="card">
    <h2 style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:nowrap">
      <span style="white-space:nowrap">词条列表</span>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
        <input type="text" id="glossarySearchInput" placeholder="搜索词条..." oninput="glossaryOnSearch(this.value)" style="background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;width:140px">
        <div class="diary-dropdown" id="glossaryGroupDropdown" style="position:relative;flex-shrink:0;width:160px">
          <button class="diary-dropdown-btn" onclick="glossaryToggleDropdown()" style="width:100%;background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
            <span id="glossaryDropdownLabel">全部群聊</span>
            <span style="font-size:10px;transition:transform .2s" id="glossaryDropdownArrow">▼</span>
          </button>
          <div class="diary-dropdown-list" id="glossaryDropdownList" style="display:none;position:absolute;top:calc(100% + 4px);right:0;min-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:10;max-height:240px;overflow-y:auto">
            <div onclick="glossarySelectGroup('')" class="diary-dropdown-item" style="padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text);border-radius:6px;margin:4px">全部群聊</div>
          </div>
        </div>
      </div>
    </h2>
    <div id="glossaryList" style="display:flex;flex-direction:column;gap:12px">
      <div style="color:var(--text-2);padding:12px">加载中...</div>
    </div>
  </div>
</div>
