<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sirius Pulse — 天文台</title>
  <link rel="icon" href="/static/yuebai.png" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display@400&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="/static/yuebai.png" alt="yuebai" class="brand-icon" style="width:36px;height:36px;border-radius:10px;object-fit:cover">
        <div class="brand-text">
          <span class="brand-name">Sirius Pulse</span>
          <span class="brand-sub">天文台</span>
        </div>
      </div>
      <div class="sidebar-persona-bar" id="personaBar"></div>
      <nav id="sidebarNav" class="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>
    <div class="main-area">
      <header id="header" class="header"></header>
      <main id="main" class="main"></main>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <div id="modalOverlay" class="modal-overlay" style="display:none"></div>
  <div id="loginOverlay" class="login-overlay" style="display:none"></div>

  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>

  <!-- Application Entry -->
  <script type="module" src="/static/app.js?v=4"></script>
</body>
</html>
